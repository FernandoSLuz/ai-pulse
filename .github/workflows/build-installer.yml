name: Build Installer (debug)

# On-demand installer build for iterating on packaging without cutting releases.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        run: npx --yes @electron/rebuild --version 33.4.11 --only better-sqlite3 --force

      - name: Verify better-sqlite3 loads under Electron ABI (source)
        shell: bash
        run: |
          ELECTRON_RUN_AS_NODE=1 node_modules/electron/dist/electron.exe -e "const D=require('better-sqlite3'); const db=new D(':memory:'); db.exec('create table t(x)'); db.close(); console.log('SRC better-sqlite3 OK under Electron ABI');"

      - name: Build installer
        run: npm run dist:ci -w @ai-pulse/widget

      - name: Verify better-sqlite3 loads under Electron ABI (packaged)
        shell: bash
        run: |
          P="$PWD/packages/widget/release/win-unpacked/resources/app/node_modules/better-sqlite3"
          ELECTRON_RUN_AS_NODE=1 node_modules/electron/dist/electron.exe -e "const D=require('$P'); new D(':memory:').close(); console.log('PKG better-sqlite3 OK under Electron ABI');"

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-pulse-installer
          path: packages/widget/release/*.exe
          if-no-files-found: warn
