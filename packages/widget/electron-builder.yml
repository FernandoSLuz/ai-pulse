appId: com.aipulse.desktop
productName: AI Pulse
copyright: © 2026 Fernando Luz

# electron is hoisted to the repo-root node_modules by npm workspaces, so
# electron-builder (run from packages/widget) can't auto-detect the version.
# Pin it explicitly; electron-builder fetches the matching dist for packaging.
electronVersion: 33.4.11

directories:
  output: release
  buildResources: build

# asar disabled so the supervised server child resolves its externals
# (better-sqlite3, node-notifier) via normal node_modules resolution.
asar: false

files:
  - dist/**/*
  - package.json
  - "!**/*.map"

# Native modules are rebuilt for Electron by a CI step (@electron/rebuild) BEFORE
# packaging. electron-builder's own rebuild spawns with cwd=<appDir>/node_modules,
# which doesn't exist under npm-workspace hoisting, so we disable it here.
npmRebuild: false
nodeGypRebuild: false

win:
  target:
    - nsis
  icon: build/icon.png
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AI Pulse
  runAfterFinish: true
  # Never wipe userData (config.json with API keys) on uninstall/update.
  deleteAppDataOnUninstall: false

# Register the aipulse:// deep link so the web dashboard can open the app.
protocols:
  - name: AI Pulse
    schemes:
      - aipulse

# Update feed for electron-updater (generates latest.yml / app-update.yml).
publish:
  provider: github
  owner: FernandoSLuz
  repo: ai-pulse
